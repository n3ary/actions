name: 'Setup pnpm with GH Packages auth'
description: >-
  Sets up Node + pnpm, writes a HOME-scoped .npmrc that maps the
  @n3ary scope to GitHub Packages with the auth token, and runs
  pnpm install. Replaces the same 6-line auth block + setup steps
  that were duplicated across ~8 workflows (pr-validation, daily,
  publish-spec, publish-adapter, etc).

  The HOME-scoped .npmrc is the canonical workaround for pnpm's
  refusal to expand env vars in the committed project .npmrc: pnpm
  reads auth from ~/.npmrc, not from NODE_AUTH_TOKEN, and writing
  to a runner-temp HOME keeps the auth file off the runner image's
  persistent state.
author: 'n3ary'

inputs:
  auth-token:
    description: >-
      Literal auth token for @n3ary/* on GitHub Packages. Required
      because composite actions cannot access `secrets.X` in their
      own expressions; the caller must resolve and pass it. Standard
      recipe: pass `${{ secrets.NPM_TOKEN }}` from the workflow.
    required: true
  node-version:
    description: 'Node.js version to install.'
    required: false
    default: '24'
  install-args:
    description: >-
      Arguments passed to `pnpm install`. Default matches the
      org-standard "lockfile is part of source, trust it" recipe.
      Override to e.g. `--no-frozen-lockfile` for repos whose install
      path needs to re-resolve.
    required: false
    default: '--frozen-lockfile --trust-lockfile'
  skip-install:
    description: 'Skip the pnpm install step. Useful when you only need the env + .npmrc set up.'
    required: false
    default: 'false'
  skip-auth:
    description: 'Skip the .npmrc write step. For repos that do not consume @n3ary/* deps from GH Packages.'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install pnpm
      uses: pnpm/action-setup@v6.0.9

    - name: Write GH Packages .npmrc
      if: inputs.skip-auth != 'true'
      shell: bash
      env:
        AUTH_TOKEN: ${{ inputs.auth-token }}
      run: |
        mkdir -p "$HOME"
        {
          echo "@n3ary:registry=https://npm.pkg.github.com"
          echo "//npm.pkg.github.com/:_authToken=${AUTH_TOKEN}"
        } > "$HOME/.npmrc"

    - name: pnpm install
      if: inputs.skip-install != 'true'
      shell: bash
      run: |
        pnpm install ${{ inputs.install-args }}