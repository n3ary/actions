name: Sync Standards

on:
  push:
    branches: [main]
    paths:
      - 'standards/**'

# The workflow needs to clone consumer repos and push branches to
# them. Use a PAT or the workflow's GITHUB_TOKEN with appropriate
# scopes (workflow tokens can open PRs on other repos if the repo
# allows it via Actions settings; for cross-repo PR creation we
# typically need a PAT).
permissions:
  contents: read

jobs:
  sync-standards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout standards
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Vendor standards + open PRs in each consumer repo
        env:
          # Cross-repo PR creation typically requires a PAT that has
          # write access to each consumer repo. The default
          # GITHUB_TOKEN is scoped to this repo only. Configure a
          # secret called STANDARDS_SYNC_TOKEN (PAT with `repo` scope
          # and access to the consumer repos).
          GH_TOKEN: ${{ secrets.STANDARDS_SYNC_TOKEN }}
        run: node scripts/vendor-standards.mjs

      - name: Summary
        if: always()
        run: |
          echo "## Standards sync" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by push to standards/ on main." >> $GITHUB_STEP_SUMMARY
          echo "Ran \`node scripts/vendor-standards.mjs\`." >> $GITHUB_STEP_SUMMARY